# Configuration file for the project
# Contains the global settings for the pipeline

pipeline:
  name: "microlane"
  version: "1.0.0"
  description: "valuating how well modern lane detection models hold up when deployed on small-scale 1/10 RC cars."

data:
  root_dir: /home/suyog/assets/datasets/

  datasets:
    tusimple:
      path: /home/suyog/assets/datasets/TuSimple/TUSimple/
      annotation_file: /home/suyog/assets/datasets/TuSimple/test_label_new.json
  
  augmentation:
    horizontal_flip: false
    random_crop: false
    color_jitter:
      brightness: 1
      contrast: 1
      saturation: 1
  
models:
  lanenet2:
    name: lanenet2
    weights: "/home/suyog/assets/weights/LaneNet2_TuSimple/tusimple_lanenet.ckpt"
    model_repo: "/home/suyog/desktop/testing/lanenet-lane-detection/"
    config_location: "microlane/models/lanenet2/config/config.yaml"
    container_folder: "/home/suyog/desktop/projects/microlane/microlane/models/lanenet2/lanenet2"
    image_name: "lanenet2_image:latest"


  ultra_fast_lane_detection:
    name: ultra_fast_lane_detection
    img_size: [288, 800]
    weights: "/home/suyog/assets/weights/UFLD_TuSimple/ulfd_tusimple_18.pth"

evaluation:
  metrics:
    - accuracy
    - f1_score
    - fps
    - precision
    - recall
  tusimple_metric: true

logging:
  level: "INFO"  # DEBUG | INFO | WARNING | ERROR
  log_dir: logs/
  log_to_file: true
  log_to_console: true
  filename_format: "{model}_{dataset}_{timestamp}.log"

inference:
  device: cuda
  confidence_threshold: 0.5

results:
  base_dir: "results"
  save_predictions: true
  save_visualizations: true
  save_metrics_csv: true
  overwrite: false