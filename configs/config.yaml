# Configuration file for the project

pipeline:
  name: "microlane"
  version: "1.0.0"
  description: "valuating how well modern lane detection models hold up when deployed on small-scale 1/10 RC cars."

data:
  root_dir: data/

  datasets:
    tusimple:
      enable: True
      path: data/TuSimple/TUSimple/
      annotation_file: data/TuSimple/test_label_new.json
  
  augmentation:
    horizontal_flip: false
    random_crop: false
    color_jitter:
      brightness: 1
      contrast: 1
      saturation: 1
  
models:
  lanenet2:
    name: lanenet2
    weights: "models/LaneNet2/lanenet2_tusimple_18.pth"
    img_size: [256, 512]

  ultra_fast_lane_detection:
    name: ultra_fast_lane_detection
    img_size: [288, 800]
    weights: "models/ufld/ulfd_tusimple_18.pth"

evaluation:
  metrics:
    - accuracy
    - f1_score
    - fps
    - precision
    - recall
  tusimple_metric: true

logging:
  level: "INFO"  # DEBUG | INFO | WARNING | ERROR
  log_dir: logs/
  log_to_file: true
  log_to_console: true
  filename_format: "{model}_{dataset}_{timestamp}.log"

inference:
  device: cuda
  confidence_threshold: 0.5

results:
  base_dir: "results"
  save_predictions: true
  save_visualizations: true
  save_metrics_csv: true
  overwrite: false