# Configuration file for the project
# Contains the global settings for the pipeline
# This contains the settings for how the experiment will be setup

pipeline:
  name: "Microlane"
  version: "1.0.0"
  description: "Evaluating how well modern lane detection models hold up when deployed on small-scale 1/10 RC cars"

data:
  datasets:
    tusimple:
      path: /home/suyog/assets/datasets/TuSimple/TUSimple/
      annotation_file: /home/suyog/assets/datasets/TuSimple/test_label_path_normalised.json
  
  augmentation:
    motion_blur: [0.0, 0.1]
    lighting: [-1.0, 1.0]
    blur: [0.0, 1.0]
    zoom: [1.0, 3]
    rotation: [0.0, 360.0]
  
models:
  lanenet2:
    name: lanenet2
    container_folder: "/home/suyog/desktop/projects/microlane/microlane/microlane/models/lanenet2/lanenet2"
    image_name: "lanenet2_image:latest"

  ultra_fast_lane_detection:
    name: ultra_fast_lane_detection
    container_folder: "/home/suyog/desktop/projects/microlane/microlane/microlane/models/ufld/ufld"
    image_name: "ufld_image:latest"
  
evaluation:
  metrics:
    - accuracy
    - f1_score
    - fps
    - precision
    - recall
  tusimple_metric: true